<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>Direct TopZorg</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <!-- Tailwind config before CDN -->
  <script>
    window.tailwind = {
      theme: {
        extend: {
          colors: {
            teal:  { DEFAULT: '#1a4060', dark: '#0f2840', mid: '#1a3a52' },
            rose:  { DEFAULT: '#c4907a' },
            gold:  { DEFAULT: '#c9a870' },
            cream: { DEFAULT: '#f8f0e8' },
            ink:   { DEFAULT: '#1a2a38' }
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body:    ['"Lora"', 'Georgia', 'serif']
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* ── CSS Custom Properties ─────────────── */
    :root {
      --c-teal:       #1a4060;
      --c-teal-dark:  #0f2840;
      --c-teal-mid:   #1a3a52;
      --c-rose:       #c4907a;
      --c-gold:       #c9a870;
      --c-cream:      #f8f0e8;
      --c-dark:       #1a2a38;
      --c-white:      #ffffff;
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --shadow-card:  0 2px 12px rgba(26,64,96,0.08), 0 1px 3px rgba(26,64,96,0.05);
      --shadow-hover: 0 12px 40px rgba(26,64,96,0.18), 0 4px 12px rgba(26,64,96,0.10);
      --shadow-rose:  0 8px 32px rgba(196,144,122,0.38);
      --section-pad:  clamp(4.5rem, 8vw, 8rem);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lora', Georgia, serif;
      color: var(--c-dark);
      background: var(--c-cream);
      overflow-x: hidden;
    }

    /* ── Navbar ─────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      background: transparent;
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }
    #navbar.scrolled {
      background: rgba(26, 64, 96, 0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(196,144,122,0.15);
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 130px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-logo img {
      height: 130px;
      width: auto;
      display: block;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      margin-left: auto;
    }
    .nav-link {
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      color: rgba(248,240,232,0.8);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }
    .nav-link:hover, .nav-link:focus-visible { color: var(--c-rose); }
    .btn-nav-cta {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1.4rem;
      background: var(--c-rose);
      color: var(--c-dark);
      font-family: 'Lora', serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 999px;
      white-space: nowrap;
      transition: background 0.2s ease, transform 0.25s var(--ease-spring), box-shadow 0.25s ease;
    }
    .btn-nav-cta:hover {
      background: var(--c-gold);
      transform: translateY(-2px);
      box-shadow: var(--shadow-rose);
    }
    .btn-nav-cta:active { transform: translateY(0); }
    .btn-nav-cta:focus-visible { outline: 3px solid rgba(196,144,122,0.5); outline-offset: 3px; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      margin-left: auto;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--c-cream);
      border-radius: 2px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(15, 40, 64, 0.98);
      padding: 1.5rem 2rem 2rem;
      gap: 1.25rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-link {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: var(--c-cream);
      text-decoration: none;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(196,144,122,0.15);
    }
    .mobile-link:focus-visible { outline: 2px solid var(--c-rose); outline-offset: 2px; }
    .mobile-cta { align-self: flex-start; margin-top: 0.5rem; }

    @media (max-width: 768px) {
      .nav-links, .btn-nav-cta:not(.mobile-cta) { display: none; }
      .hamburger { display: flex; }
    }

    /* ── Sections ───────────────────────────── */
    section { position: relative; overflow: hidden; }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--section-pad) 2rem;
    }

    /* ── Typography ─────────────────────────── */
    .display-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 5.5vw, 4.75rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.06;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3.5vw, 2.85rem);
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1.15;
    }
    .section-subtitle {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      opacity: 0.72;
      margin-top: 0.6rem;
    }

    /* ── Buttons ────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 2.2rem;
      background: var(--c-rose);
      color: var(--c-dark);
      font-family: 'Lora', serif;
      font-size: 0.975rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.25s var(--ease-spring), box-shadow 0.25s ease;
    }
    .btn-primary:hover {
      background: var(--c-gold);
      transform: translateY(-3px);
      box-shadow: var(--shadow-rose);
    }
    .btn-primary:active { transform: translateY(-1px); }
    .btn-primary:focus-visible { outline: 3px solid rgba(196,144,122,0.5); outline-offset: 3px; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      padding: 0.85rem 2.2rem;
      background: transparent;
      color: var(--c-cream);
      font-family: 'Lora', serif;
      font-size: 0.975rem;
      text-decoration: none;
      border-radius: 999px;
      border: 1.5px solid rgba(248,240,232,0.35);
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, transform 0.25s var(--ease-spring);
    }
    .btn-ghost:hover {
      border-color: var(--c-gold);
      color: var(--c-gold);
      transform: translateY(-3px);
    }
    .btn-ghost:focus-visible { outline: 3px solid rgba(201,168,112,0.5); outline-offset: 3px; }

    /* ── Service cards ──────────────────────── */
    .service-card {
      background: var(--c-white);
      border-radius: 14px;
      padding: 2rem 1.75rem;
      border-left: 4px solid var(--c-rose);
      box-shadow: var(--shadow-card);
      transition: transform 0.3s var(--ease-spring), box-shadow 0.3s ease, border-left-color 0.25s ease;
    }
    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-left-color: var(--c-gold);
    }
    .service-card .icon-wrap {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(196,144,122,0.1);
      border-radius: 12px;
      margin-bottom: 1.25rem;
      color: var(--c-rose);
    }
    .service-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--c-teal);
      margin-bottom: 0.6rem;
      letter-spacing: -0.01em;
    }
    .service-card p {
      font-size: 0.93rem;
      line-height: 1.72;
      color: var(--c-dark);
      opacity: 0.82;
    }

    /* ── Why cards ──────────────────────────── */
    .why-card .icon-circle {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: rgba(196,144,122,0.1);
      border: 1.5px solid rgba(196,144,122,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      color: var(--c-rose);
    }
    .why-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 500;
      color: var(--c-teal);
      margin-bottom: 0.5rem;
    }
    .why-card p { font-size: 0.93rem; line-height: 1.72; color: var(--c-dark); opacity: 0.82; }

    /* ── Stat bubbles (medicine wheel) ─────── */
    .stat-bubble {
      width: 115px;
      height: 115px;
      border-radius: 50%;
      border: 2px solid rgba(196,144,122,0.35);
      background: rgba(196,144,122,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 10px;
    }
    .stat-bubble .val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.25rem;
      font-weight: 500;
      color: var(--c-gold);
      line-height: 1;
    }
    .stat-bubble .lbl {
      font-family: 'Lora', serif;
      font-size: 0.68rem;
      color: rgba(248,240,232,0.72);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.35;
      margin-top: 5px;
    }

    /* ── Area pills ─────────────────────────── */
    .area-pill {
      display: inline-flex;
      padding: 0.45rem 1.2rem;
      background: rgba(196,144,122,0.1);
      border: 1px solid rgba(196,144,122,0.28);
      color: var(--c-rose);
      font-family: 'Lora', serif;
      font-size: 0.88rem;
      border-radius: 999px;
      transition: background 0.2s ease;
    }
    .area-pill:hover { background: rgba(196,144,122,0.2); }

    /* ── Form ───────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label {
      font-family: 'Lora', serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--c-teal);
      letter-spacing: 0.01em;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      font-family: 'Lora', serif;
      font-size: 0.93rem;
      color: var(--c-dark);
      background: var(--c-white);
      border: 1.5px solid rgba(26,64,96,0.18);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--c-rose);
      box-shadow: 0 0 0 3px rgba(196,144,122,0.14);
    }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select { appearance: none; cursor: pointer; }

    .checkbox-group { display: flex; gap: 0.75rem; align-items: flex-start; }
    .checkbox-group input[type="checkbox"] {
      width: 17px; height: 17px;
      flex-shrink: 0;
      accent-color: var(--c-rose);
      margin-top: 2px;
    }
    .checkbox-group label {
      font-family: 'Lora', serif;
      font-size: 0.83rem;
      color: var(--c-dark);
      opacity: 0.78;
      line-height: 1.5;
    }

    /* ── Process steps ──────────────────────── */
    .step-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5.5rem;
      font-weight: 600;
      line-height: 1;
      color: rgba(26,64,96,0.065);
      position: absolute;
      top: -18px;
      left: -8px;
      pointer-events: none;
      letter-spacing: -0.04em;
    }

    /* ── Feather divider ────────────────────── */
    .feather-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 260px;
      margin: 0 auto 2.75rem;
    }
    .feather-line {
      flex: 1;
      height: 1px;
      background: rgba(196,144,122,0.3);
    }

    /* ── Scroll reveal ──────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s var(--ease-out), transform 0.75s var(--ease-out);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Hero animations ────────────────────── */
    @keyframes hero-fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes feather-float {
      0%, 100% { transform: translateY(-50%) rotate(-2deg); }
      50%       { transform: translateY(calc(-50% - 22px)) rotate(1.5deg); }
    }

    .hero-text-1 { animation: hero-fade-up 0.9s var(--ease-out) 0.1s both; }
    .hero-text-2 { animation: hero-fade-up 0.9s var(--ease-out) 0.28s both; }
    .hero-text-3 { animation: hero-fade-up 0.9s var(--ease-out) 0.48s both; }

    .hero-feather {
      position: absolute;
      right: -2%;
      top: 50%;
      transform: translateY(-50%) rotate(-2deg);
      width: clamp(380px, 42vw, 580px);
      height: auto;
      pointer-events: none;
      opacity: 0.32;
      animation: feather-float 10s ease-in-out infinite;
    }

    /* ── Noise texture ──────────────────────── */
    .noise-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Native American border strip ───────── */
    .natam-strip {
      width: 100%;
      height: 12px;
      display: block;
    }

    /* ── Expertise vertical accent ──────────── */
    .expertise-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(201,168,112,0.1);
      border: 1px solid rgba(201,168,112,0.22);
      border-radius: 999px;
      padding: 0.35rem 1.1rem;
      margin-bottom: 1.5rem;
    }

    /* ── Contact info links ─────────────────── */
    .contact-info-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--c-teal);
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }
    .contact-info-link:hover { color: var(--c-rose); }
    .contact-info-link:focus-visible { outline: 2px solid var(--c-rose); outline-offset: 2px; border-radius: 4px; }

    /* ── Footer ─────────────────────────────── */
    footer a {
      color: rgba(248,240,232,0.58);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    footer a:hover { color: var(--c-rose); }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 960px) {
      .about-grid    { grid-template-columns: 1fr !important; }
      .contact-grid  { grid-template-columns: 1fr !important; gap: 3rem !important; }
      .footer-grid   { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 640px) {
      .footer-grid       { grid-template-columns: 1fr !important; gap: 2.5rem !important; }
      .form-row-2        { grid-template-columns: 1fr !important; }
      .hero-feather      { width: 240px !important; opacity: 0.18 !important; right: -10% !important; }
      .stat-bubbles-wrap { flex-direction: row !important; flex-wrap: wrap !important; justify-content: center !important; }
    }
  </style>
</head>
<body>

<nav id="navbar"></nav>

<main>
  <section id="hero"></section>
  <section id="intro"></section>
  <section id="over-ons"></section>
  <section id="diensten"></section>
  <section id="expertise"></section>
  <section id="werkwijze"></section>
  <section id="waarom"></section>
  <section id="regio"></section>
  <section id="contact"></section>
</main>

<footer id="footer"></footer>

<script>
// ═══════════════════════════════════════════════════
// SVG CONSTANTS
// ═══════════════════════════════════════════════════

const FEATHER_SVG = `
<svg class="hero-feather" viewBox="0 0 320 520" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  <circle cx="160" cy="295" r="178" stroke="#c4907a" stroke-width="1.8"/>

  <!-- Feather spine – S-curve -->

  <path d="M145 237 C125 230 98  229 76  238" stroke="#c4907a" stroke-width="1.6" stroke-linecap="round"/>

  <path d="M171 142 C194 129 228 122 258 128" stroke="#c4907a" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M174 174 C198 160 232 153 262 159" stroke="#c4907a" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M175 206 C198 196 230 193 255 201" stroke="#c4907a" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Feather eye -->

  <ellipse cx="160" cy="310" rx="18" ry="28" fill="#c4907a" opacity="0.18"/>

  <circle  cx="160" cy="310" r="5"   fill="#c4907a" opacity="0.8"/>
</svg>`;

function nativeBorder(id) {
  return `<svg class="natam-strip" style="height:14px;" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <pattern id="${id}" x="0" y="0" width="32" height="14" patternUnits="userSpaceOnUse">
        <polygon points="16,2 26,12 6,12" fill="none" stroke="#c9a870" stroke-width="1.1" opacity="0.55"/>
        <circle cx="2"  cy="7" r="1.8" fill="#c9a870" opacity="0.38"/>
        <circle cx="30" cy="7" r="1.8" fill="#c9a870" opacity="0.38"/>
      </pattern>
    </defs>
    <rect width="100%" height="14" fill="url(#${id})"/>
  </svg>`;
}

const FEATHER_EYE = `
<div class="feather-divider" aria-hidden="true">
  <span class="feather-line"></span>
  <svg width="44" height="66" viewBox="0 0 44 66" fill="none">
    <ellipse cx="22" cy="33" rx="17" ry="30" stroke="#c4907a" stroke-width="1.6" opacity="0.6"/>
    <ellipse cx="22" cy="33" rx="10" ry="18" fill="#c4907a" opacity="0.12"/>

// ═══════════════════════════════════════════════════
// INIT & INTERACTION
// ═══════════════════════════════════════════════════

function initScrollAnimations() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = parseInt(entry.target.dataset.delay || '0', 10);
        setTimeout(() => entry.target.classList.add('visible'), delay);
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('[data-reveal]').forEach(el => {
    el.classList.add('reveal');
    obs.observe(el);
  });
}

function initMobileMenu() {
  const btn  = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  if (!btn || !menu) return;

  btn.addEventListener('click', () => {
    const open = menu.classList.toggle('open');
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', String(open));
  });

  menu.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => {
      menu.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    })
  );
}

function initStickyNav() {
  const nav = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
}

function handleFormSubmit(e) {
  e.preventDefault();
  document.getElementById('formMsg').style.display = 'block';
  e.target.reset();
}

// ═══════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  fetch('./content.json')
    .then(r => r.json())
    .then(data => {
      renderMeta(data.meta);
      renderNav(data.nav);
      renderHero(data.hero);
      renderIntro(data.intro);
      renderAbout(data.about);
      renderServices(data.services);
      renderExpertise(data.expertise);
      renderProcess(data.process);
      renderWhy(data.why);
      renderRegion(data.region);
      renderContact(data.contact);
      renderFooter(data);
      initScrollAnimations();
      initMobileMenu();
      initStickyNav();
      if (window.lucide) lucide.createIcons();
    })
    .catch(err => {
      document.body.innerHTML = `
        <div style="padding:3rem;font-family:sans-serif;max-width:600px;margin:0 auto;">
          <h1 style="color:#c00;">Fout bij laden</h1>
          <p>Zorg dat <code>content.json</code> aanwezig is en de pagina via een webserver geladen wordt:</p>
          <pre style="background:#f5f5f5;padding:1rem;margin-top:1rem;border-radius:6px;">node serve.mjs</pre>
          <p style="margin-top:1rem;color:#888;font-size:0.85rem;">${err}</p>
        </div>`;
    });
});
</script>
